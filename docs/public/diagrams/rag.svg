  <rect x="60" y="260" width="140" height="60" rx="8" ry="8" fill="#a5d8ff" stroke="#1e1e1e" stroke-width="2" opacity="1"/><text x="130.0" y="293.6" font-size="16" font-family="'Cascadia Code', 'JetBrains Mono', Consolas, monospace" fill="#1e1e1e" opacity="1"><tspan x="130.0" dy="0" text-anchor="middle">用户问题 q</tspan></text>
  <rect x="260" y="260" width="150" height="60" rx="8" ry="8" fill="#b2f2bb" stroke="#1e1e1e" stroke-width="2" opacity="1"/><text x="335.0" y="284.0" font-size="15" font-family="'Cascadia Code', 'JetBrains Mono', Consolas, monospace" fill="#1e1e1e" opacity="1"><tspan x="335.0" dy="0" text-anchor="middle">Embedding 模型</tspan><tspan x="335.0" dy="18.75" text-anchor="middle">(句向量)</tspan></text>
  <rect x="470" y="180" width="170" height="100" rx="8" ry="8" fill="#ffd43b" stroke="#1e40af" stroke-width="2" opacity="1"/><text x="555.0" y="224.0" font-size="15" font-family="'Cascadia Code', 'JetBrains Mono', Consolas, monospace" fill="#1e40af" opacity="1"><tspan x="555.0" dy="0" text-anchor="middle">向量数据库</tspan><tspan x="555.0" dy="18.75" text-anchor="middle">(HNSW/IVF 索引)</tspan></text>
  <text x="555.0" y="297.0" font-size="12" font-family="'Cascadia Code', 'JetBrains Mono', Consolas, monospace" fill="#64748b" opacity="1"><tspan x="555.0" dy="0" text-anchor="middle">库内：文档切块后的</tspan><tspan x="555.0" dy="15" text-anchor="middle">句向量 + 原文</tspan></text>
